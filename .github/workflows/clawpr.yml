name: ClawPR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ClawPR
        uses: SkunkWorks0x/clawpr@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
